<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Animated Invoice Dashboard</title>
<!-- Google Fonts & FontAwesome for Premium Icons -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- Three.js Library for 3D Background -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #0a0a16;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Three.js Canvas Container */
#canvas-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Premium Glassmorphism Container */
.container {
    width: 90%;
    max-width: 1050px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    animation: fadeIn 1.2s ease-out;
    transform-style: preserve-3d;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

h1 {
    text-align: center;
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 30px;
    background: linear-gradient(45deg, #00f2fe, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0px 10px 20px rgba(0, 242, 254, 0.2);
}

/* Form Metadata Rows */
.row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 30px;
}

.input-group {
    flex: 1;
    min-width: 200px;
    position: relative;
}

.input-group i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #00f2fe;
    opacity: 0.7;
}

input {
    width: 100%;
    padding: 14px 14px 14px 45px;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: #fff;
    font-size: 0.95rem;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    background: rgba(255, 255, 255, 0.15);
    border-color: #00f2fe;
    box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
}

input[readonly] {
    cursor: not-allowed;
    background: rgba(255, 255, 255, 0.03);
    color: #aaa;
}

/* Modern Dynamic Table Styling */
.table-wrapper {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(0, 0, 0, 0.2);
    margin-bottom: 25px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 16px;
    text-align: center;
}

th {
    background: rgba(79, 172, 254, 0.2);
    color: #00f2fe;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 1px;
}

td {
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

td input {
    padding: 10px;
    text-align: center;
}

td .product-name {
    padding-left: 15px;
    text-align: left;
}

.t {
    font-weight: 600;
    color: #00f2fe;
}

/* Futuristic Action Buttons */
.actions {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-bottom: 25px;
}

button {
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    font-size: 0.95rem;
}

.btn-add {
    background: linear-gradient(135deg, #11998e, #38ef7d);
    color: white;
}

.btn-calc {
    background: linear-gradient(135deg, #00f2fe, #4facfe);
    color: white;
}

.btn-print {
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    color: white;
}

button:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    filter: brightness(1.15);
}

button:active {
    transform: translateY(-1px);
}

/* Total Bar Visual */
.total-wrapper {
    display: flex;
    justify-content: flex-end;
    padding: 20px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    border-left: 5px solid #00f2fe;
}

.total {
    font-size: 1.4rem;
    font-weight: 700;
}

.total span {
    color: #38ef7d;
    text-shadow: 0 0 10px rgba(56, 239, 125, 0.4);
}

/* Clean Print Overrides */
@media print {
    #canvas-container, button, .actions { display: none !important; }
    body { background: #fff; color: #000; }
    .container {
        border: none;
        box-shadow: none;
        background: transparent;
        backdrop-filter: none;
        color: #000;
        width: 100%;
        max-width: 100%;
        padding: 0;
    }
    h1 { -webkit-text-fill-color: #000; margin-bottom: 20px; }
    input {
        background: transparent !important;
        border: 1px solid #000 !important;
        color: #000 !important;
    }
    th { background: #eee !important; color: #000 !important; }
    td { border-bottom: 1px solid #ccc !important; }
    .t, .total span { color: #000 !important; text-shadow: none !important; }
}
</style>
</head>
<body>

<!-- Interactive 3D Canvas Background -->
<div id="canvas-container"></div>

<div class="container">
    <h1><i class="fa-solid fa-file-invoice-dollar"></i> Invoice Generation System</h1>
    
    <!-- Meta details section -->
    <div class="row">
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input id="customer" placeholder="Customer Name">
        </div>
        <div class="input-group">
            <i class="fa-solid fa-hashtag"></i>
            <input id="invoice" readonly>
        </div>
        <div class="input-group">
            <i class="fa-solid fa-calendar-days"></i>
            <input id="date" type="date">
        </div>
    </div>

    <!-- Main dynamic table -->
    <div class="table-wrapper">
        <table id="tbl">
            <thead>
                <tr>
                    <th>Product Item</th>
                    <th>Qty</th>
                    <th>Price (₹)</th>
                    <th>GST %</th>
                    <th>Total (₹)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input class="product-name" placeholder="Enter Product Name"></td>
                    <td><input type="number" value="1" min="1" oninput="calc()"></td>
                    <td><input type="number" value="0" min="0" oninput="calc()"></td>
                    <td><input type="number" value="18" min="0" oninput="calc()"></td>
                    <td class="t">0.00</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- UI Interaction Handles -->
    <div class="actions">
        <button class="btn-add" onclick="addRow()"><i class="fa-solid fa-plus"></i> Add Item</button>
        <button class="btn-calc" onclick="calc()"><i class="fa-solid fa-calculator"></i> Recalculate</button>
        <button class="btn-print" onclick="window.print()"><i class="fa-solid fa-print"></i> Print Invoice</button>
    </div>

    <div class="total-wrapper">
        <div class="total">Grand Total: <span>₹<span id="grand">0.00</span></span></div>
    </div>
</div>

<script>
// 1. Automatic Fields Initialization
document.getElementById('invoice').value = 'INV-' + Math.floor(Math.random() * 90000 + 10000);
document.getElementById('date').value = new Date().toISOString().slice(0, 10);

// 2. Core Functional Logic 
function addRow() {
    let tr = document.createElement('tr');
    tr.style.opacity = '0';
    tr.style.transform = 'translateY(10px)';
    tr.style.transition = 'all 0.4s ease';
    
    tr.innerHTML = `
        <td><input class="product-name" placeholder="Enter Product Name"></td>
        <td><input type="number" value="1" min="1" oninput="calc()"></td>
        <td><input type="number" value="0" min="0" oninput="calc()"></td>
        <td><input type="number" value="18" min="0" oninput="calc()"></td>
        <td class="t">0.00</td>
    `;
    document.querySelector('#tbl tbody').appendChild(tr);
    
    // Smooth Entry Animation for rows
    setTimeout(() => {
        tr.style.opacity = '1';
        tr.style.transform = 'translateY(0)';
    }, 10);
}

function calc() {
    let grandTotal = 0;
    document.querySelectorAll('#tbl tbody tr').forEach(row => {
        let inputs = row.querySelectorAll('input');
        let qty = +inputs[1].value || 0;
        let price = +inputs[2].value || 0;
        let gst = +inputs[3].value || 0;
        
        let rowTotal = qty * price * (1 + gst / 100);
        row.querySelector('.t').textContent = rowTotal.toFixed(2);
        grandTotal += rowTotal;
    });
    document.getElementById('grand').textContent = grandTotal.toFixed(2);
}

// 3. Three.js - 3D Background Matrix Creation
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

// Populate 3D space with complex wireframe geometry elements
const geometry = new THREE.IcosahedronGeometry(0.7, 1);
const material = new THREE.MeshBasicMaterial({ color: 0x00f2fe, wireframe: true, transparent: true, opacity: 0.15 });
const instancedMesh = new THREE.Group();

for (let i = 0; i < 45; i++) {
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(
        (Math.random() - 0.5) * 30,
        (Math.random() - 0.5) * 30,
        (Math.random() - 0.5) * 30
    );
    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
    mesh.userData = {
        speedX: (Math.random() - 0.5) * 0.01,
        speedY: (Math.random() - 0.5) * 0.01
    };
    instancedMesh.add(mesh);
}
scene.add(instancedMesh);
camera.position.z = 12;

// Interactive 3D Parallax Mouse Tracking
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX - window.innerWidth / 2) * 0.0003;
    mouseY = (e.clientY - window.innerHeight / 2) * 0.0003;
});

// Render Engine Animation Frame Loop
function animate() {
    requestAnimationFrame(animate);
    
    instancedMesh.children.forEach(mesh => {
        mesh.rotation.x += 0.002;
        mesh.rotation.y += 0.003;
        mesh.position.x += mesh.userData.speedX;
        mesh.position.y += mesh.userData.speedY;

        // Boundaries reset
        if (Math.abs(mesh.position.x) > 15) mesh.userData.speedX *= -1;
        if (Math.abs(mesh.position.y) > 15) mesh.userData.speedY *= -1;
    });

    // Camera organic breathing tracking response
    camera.position.x += (mouseX * 10 - camera.position.x) * 0.05;
    camera.position.y += (-mouseY * 10 - camera.position.y) * 0.05;
    camera.lookAt(scene.position);

    renderer.render(scene, camera);
}
animate();

// Handling Viewport Window Resizes dynamically
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial load check
calc();
</script>
</body>
</html>
